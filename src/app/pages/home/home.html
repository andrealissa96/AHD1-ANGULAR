<body>
    <app-banner></app-banner>


    <div class="titulo">

        <h2> Cursos Destacados</h2>
        <h3>Los cursos más populares</h3>

    </div>


    <section class="cursos-destacados">

        @for(curso of cursos; track curso.idCurso){
        <app-curso-card [curso]="curso"></app-curso-card>
        }
        
    </section>

    <h2> Instructores Destacados</h2>
        <h3>Los mejores profesionales</h3>

    <section class="instructores-destacados">
        

        @for (instructor of instructores; track instructor.idInstructor) {
        <app-instructor-card [instructor]="instructor"></app-instructor-card>
        }
        <!--PENDIENTE DE COLOCAR CARD SOBRE INSTRUCTORES-->
    </section>
</body>
